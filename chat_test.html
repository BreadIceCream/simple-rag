<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天接口测试 (SSE 流式输出，暂不支持记忆)</title>
    <!-- 引入 marked 用于 markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f9fafb;
            color: #1f2937;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background-color: #fff;
            border-bottom: 1px solid #e5e7eb;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: #111827;
        }

        .chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-area {
            padding: 20px;
            background-color: #fff;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        #messageInput:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        #sendBtn {
            padding: 12px 24px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #sendBtn:hover {
            background-color: #2563eb;
        }

        #sendBtn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ai {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 16px;
            border-radius: 12px;
        }

        .user .message-bubble {
            background-color: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .message-bubble {
            background-color: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        /* 思考过程框样式 */
        .think-box {
            border: 1px solid #e5e7eb;
            background-color: #ffffff;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .think-header {
            padding: 12px 16px;
            background-color: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            font-weight: 600;
            color: #4b5563;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            user-select: none;
        }

        .think-header:hover {
            background-color: #f3f4f6;
        }

        /* 固定高度且支持滚动的折叠内容区 */
        .think-content {
            padding: 16px;
            height: 200px;
            overflow-y: auto;
            font-size: 0.9rem;
            color: #6b7280;
            display: block;
        }

        .think-content.collapsed {
            display: none;
        }

        .answer-box {
            line-height: 1.6;
        }

        /* Markdown 响应式样式 */
        .markdown-body pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
        }

        .markdown-body code {
            background: #e2e8f0;
            color: #ef4444;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9em;
        }

        .markdown-body pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .markdown-body p {
            margin-top: 0;
            margin-bottom: 12px;
        }

        .markdown-body p:last-child {
            margin-bottom: 0;
        }

        .markdown-body blockquote {
            border-left: 4px solid #cbd5e1;
            margin: 0 0 12px 0;
            padding-left: 16px;
            color: #64748b;
        }

        .user .markdown-body p {
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">Agentic RAG Chat 流式测试</div>

        <div id="chatHistory" class="chat-history">
            <!-- 聊天记录将被追加到这里 -->
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入您的问题..." />
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let currentConversationId = null;

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // 锁定输入和按钮
            messageInput.value = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;

            // 显示用户发送的消息
            appendMessageDom('user', message);

            // 初始化 AI 回复的 DOM 结构
            const { aiMessageContainer, thinkBox, thinkHeaderTitle, thinkContent, answerBox } = createAiMessageDom();
            let thinkTextRaw = '';

            try {
                // 请求流式接口
                const response = await fetch('http://localhost:8000/api/conversation/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: currentConversationId
                    })
                });

                if (!response.ok) {
                    throw new Error(`请求失败，状态码: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = '';

                // 读取 SSE 流
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');

                    // 保留最后一段不完整的片段放入缓冲区
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (!dataStr) continue;

                            try {
                                const data = JSON.parse(dataStr);

                                // 处理思考状态 (progress)
                                if (data.status === 'progress') {
                                    thinkBox.style.display = 'block';
                                    if (data.event) {
                                        thinkHeaderTitle.textContent = data.event; // 更新小标题
                                    }
                                    if (data.token) {
                                        thinkTextRaw += data.token;
                                        // 思考过程也使用 markdown 渲染
                                        thinkContent.innerHTML = marked.parse(thinkTextRaw);
                                        // 自动流式滚动到底部
                                        thinkContent.scrollTop = thinkContent.scrollHeight;
                                    }
                                }
                                // 处理完成状态 (finished)
                                else if (data.status === 'finished') {
                                    if (data.answer) {
                                        // 将最终答案渲染到主视图
                                        answerBox.innerHTML = marked.parse(data.answer);
                                    }
                                    if (data.thread_id) {
                                        currentConversationId = data.thread_id; // 保存会话ID
                                    }
                                }
                                // 处理错误状态
                                else if (data.status === 'error') {
                                    answerBox.innerHTML += `<p style="color: #ef4444;">发生错误: ${data.message}</p>`;
                                }

                                scrollToBottom();
                            } catch (e) {
                                console.error('JSON 解析错误:', e, dataStr);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('网络或解析异常:', error);
                answerBox.innerHTML = `<p style="color: #ef4444;">系统异常: ${error.message}</p>`;
            } finally {
                // 恢复输入状态
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
                scrollToBottom();
            }
        }

        // 创建用户消息节点
        function appendMessageDom(role, text) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            if (role === 'user') {
                bubble.textContent = text;
            }
            row.appendChild(bubble);
            chatHistory.appendChild(row);
            scrollToBottom();
            return bubble;
        }

        // 创建 AI 响应的骨架节点 (包含思考框和回答框)
        function createAiMessageDom() {
            const row = document.createElement('div');
            row.className = 'message-row ai';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            // 思考过程框
            const thinkBox = document.createElement('div');
            thinkBox.className = 'think-box';
            thinkBox.style.display = 'none'; // 默认隐藏

            const thinkHeader = document.createElement('div');
            thinkHeader.className = 'think-header';

            const thinkHeaderTitle = document.createElement('span');
            thinkHeaderTitle.textContent = '思考中...';

            const toggleIcon = document.createElement('span');
            toggleIcon.className = 'toggle-icon';
            toggleIcon.textContent = '▼';
            toggleIcon.style.fontSize = '12px';

            thinkHeader.appendChild(thinkHeaderTitle);
            thinkHeader.appendChild(toggleIcon);

            const thinkContent = document.createElement('div');
            thinkContent.className = 'think-content markdown-body';

            // 点击头部折叠展开
            thinkHeader.onclick = () => {
                thinkContent.classList.toggle('collapsed');
                toggleIcon.textContent = thinkContent.classList.contains('collapsed') ? '▶' : '▼';
            };

            thinkBox.appendChild(thinkHeader);
            thinkBox.appendChild(thinkContent);
            bubble.appendChild(thinkBox);

            // 最终回答框
            const answerBox = document.createElement('div');
            answerBox.className = 'answer-box markdown-body';
            bubble.appendChild(answerBox);

            row.appendChild(bubble);
            chatHistory.appendChild(row);
            scrollToBottom();

            return { bubble, thinkBox, thinkHeaderTitle, thinkContent, answerBox };
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>

</html>
