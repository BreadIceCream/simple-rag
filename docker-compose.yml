services:
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pg123456
      POSTGRES_DB: simple_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
    name: pg-data
