name: simple-rag

services:
  postgres-db:
    container_name: simple-rag-db
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pg123456
      POSTGRES_DB: simple_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - simple-rag-network

volumes:
  postgres-data:
    name: simple-rag-pg-data

networks:
  simple-rag-network:
    name: simple-rag-network